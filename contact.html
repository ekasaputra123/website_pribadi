<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Stefanus Eka S. M.</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="contact-body">

    <nav id="mainNav" class="navbar navbar-expand-lg navbar-dark fixed-top transparent">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">CV</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <section id="contact" class="contact-section-new">
            <div class="container">
                <div class="text-center mb-5" data-aos="zoom-in">
                    <h2 class="contact-title-new">HUBUNGI SAYA</h2>
                </div>

                <div class="row g-5">
                    <!-- Left Column: Contact Info -->
                    <div class="col-lg-6 contact-info-box" data-aos="fade-right">
                        <div class="d-flex align-items-start mb-4">
                            <i class="bi bi-geo-alt-fill fs-3 me-4"></i>
                            <div>
                                <h5 class="mb-1">Alamat</h5>
                                <p class="mb-0">Perumahan Araya Malang, Indonesia</p>
                            </div>
                        </div>
                        <div class="d-flex align-items-start mb-4">
                            <i class="bi bi-telephone-fill fs-3 me-4"></i>
                            <div>
                                <h5 class="mb-1">Telepon</h5>
                                <p class="mb-0">0821234567890</p>
                            </div>
                        </div>
                        <div class="d-flex align-items-start mb-5">
                            <i class="bi bi-envelope-fill fs-3 me-4"></i>
                            <div>
                                <h5 class="mb-1">Email</h5>
                                <p class="mb-0">stefanus.eka@student.machung.ac.id</p>
                            </div>
                        </div>
                        <a href="https://wa.me/6281234567890" target="_blank" class="btn btn-neon-green btn-lg w-100 d-flex align-items-center justify-content-center py-3">
                            <i class="bi bi-whatsapp me-2"></i> Chat via WhatsApp
                        </a>
                    </div>

                   
                    <div class="col-lg-6 contact-form-box" data-aos="fade-left">
                        <form class="d-flex flex-column flex-grow-1">
                            <!-- Baris 1: Nama Lengkap -->
                            <div class="mb-4">
                                <label for="fullName" class="form-label">Nama lengkap</label>
                                <input type="text" class="form-control form-control-lg form-control-neon" id="fullName" required>
                            </div>

                            <!-- Baris 2: Email & Subject -->
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control form-control-lg form-control-neon" id="email" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="subject" class="form-label">Subject</label>
                                    <input type="text" class="form-control form-control-lg form-control-neon" id="subject" required>
                                </div>
                            </div>

                            <!-- Baris 3: Pesan -->
                            <div class="mb-4 flex-grow-1 d-flex flex-column">
                                <label for="message" class="form-label">Pesan</label>
                                <textarea class="form-control form-control-lg form-control-neon flex-grow-1" id="message" required></textarea>
                            </div>

                            <!-- Tombol Kirim -->
                            <div class="text-end">
                                <button type="submit" class="btn btn-neon-solid btn-lg py-3 px-5">Kirim Pesan</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      AOS.init({
        duration: 800,
        once: true,
      });
    </script>
</body>
</html>
